name: Migration Docker build and push

on:
  workflow_call:
    inputs:
      service-name:
        description: "Service name (e.g., site-api)"
        type: string
        required: true
      service-path:
        description: "Path to service directory (e.g., services/site-api)"
        type: string
        required: true
      db-folder:
        description: "Database folder under <service-path>/db-migration (e.g., agency_site_db)"
        type: string
        required: true
      dockerfile-path:
        description: "Path to the migration Dockerfile in the caller repo"
        type: string
        required: false
        default: "tools/db-migration/k8s/Dockerfile"
      should-push:
        type: boolean
        required: true

jobs:
  build:
    name: Build migration image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.28.0"

      - name: Configure kubectl
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBE_CONFIG" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Get registry credentials
        id: registry-creds
        run: |
          REGISTRY_URL="registry.computeflux.xyz"
          REGISTRY_USER=$(kubectl get secret -n platform zot-registry-auth -o jsonpath='{.data.username}' | base64 -d)
          REGISTRY_PASS=$(kubectl get secret -n platform zot-registry-auth -o jsonpath='{.data.password}' | base64 -d)
          if [ -z "$REGISTRY_PASS" ]; then echo "ERROR: no registry password"; exit 1; fi
          echo "registry-url=${REGISTRY_URL}" >> $GITHUB_OUTPUT
          echo "registry-user=${REGISTRY_USER}" >> $GITHUB_OUTPUT
          echo "::add-mask::${REGISTRY_PASS}"
          echo "registry-password=${REGISTRY_PASS}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Registry
        if: inputs.should-push
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.registry-creds.outputs.registry-url }}
          username: ${{ steps.registry-creds.outputs.registry-user }}
          password: ${{ steps.registry-creds.outputs.registry-password }}

      - name: Build and push migration image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.service-path }}/db-migration/${{ inputs.db-folder }}
          file: ${{ inputs.dockerfile-path }}
          platforms: linux/amd64
          push: ${{ inputs.should-push }}
          tags: ${{ steps.registry-creds.outputs.registry-url }}/${{ inputs.service-name }}-migrations:latest
          cache-from: type=gha,scope=migrations-${{ inputs.service-name }}
          cache-to: type=gha,mode=max,scope=migrations-${{ inputs.service-name }}
