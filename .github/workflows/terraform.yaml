name: Terraform

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yaml"
  pull_request:
    paths:
      - "terraform/**"

jobs:
  validate:
    name: fmt + validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Format check
        run: |
          # .tfvars / .tfstate are git-crypt-encrypted in CI and can't be parsed,
          # so fmt-check only the .tf files.
          fail=0
          while IFS= read -r f; do
            terraform fmt -check "$f" >/dev/null || { echo "unformatted: $f"; fail=1; }
          done < <(find . -path ./.terraform -prune -o -name '*.tf' -print)
          exit $fail

      - name: Init (no backend)
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate
