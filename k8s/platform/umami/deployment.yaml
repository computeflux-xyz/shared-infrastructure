apiVersion: apps/v1
kind: Deployment
metadata:
  name: umami
  namespace: platform
  labels:
    app: umami
    component: analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: umami
  template:
    metadata:
      labels:
        app: umami
        component: analytics
    spec:
      containers:
        - name: umami
          image: ghcr.io/umami-software/umami:postgresql-latest
          env:
            - name: DATABASE_TYPE
              value: postgresql
            # `uri` is generated by CloudNativePG in the umami-pg-cluster-app secret:
            # postgresql://umami:<pw>@umami-pg-cluster-rw:5432/umami
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: umami-pg-cluster-app
                  key: uri
            # Umami serves at the root here. BASE_PATH is build-time only, so the
            # subpath (/push-analytics) is produced by the gateway ingress rewrite,
            # not by this container. See platform/api-gateway/ingress.yaml.
            # Optional hardening: a stable APP_SECRET keeps sessions valid across
            # restarts. Seal one with `task seal:secret` (name umami-app-secret,
            # key app-secret, namespace platform). Falls back to a DB-derived hash
            # when absent.
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: umami-app-secret
                  key: app-secret
                  optional: true
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /script.js
              port: 3000
            periodSeconds: 10
            failureThreshold: 30 # up to 5 min for first-run DB migrations
          readinessProbe:
            httpGet:
              path: /script.js
              port: 3000
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /script.js
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
