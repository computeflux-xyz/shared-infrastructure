apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: umami-pg-cluster
  namespace: platform
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/instance: umami
    app.kubernetes.io/component: database
spec:
  description: "Umami analytics PostgreSQL (minimal, single instance)"
  imageName: ghcr.io/cloudnative-pg/postgresql:17.2
  instances: 1
  primaryUpdateStrategy: unsupervised

  postgresql:
    parameters:
      shared_buffers: "128MB"
      max_connections: "50"
    pg_hba:
      - host all all 10.0.0.0/8 scram-sha-256

  # No `secret:` under initdb -> CloudNativePG generates the `umami-pg-cluster-app`
  # secret (owner creds + a ready-to-use `uri`), which the deployment consumes.
  bootstrap:
    initdb:
      database: umami
      owner: umami

  storage:
    storageClass: hcloud-volumes-encrypted
    size: 5Gi

  walStorage:
    storageClass: hcloud-volumes-encrypted
    size: 2Gi

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  # WAL + base backups to Hetzner object storage. Credentials reuse the platform
  # S3 secret (same Hetzner keys as the registry). Backups land under a dedicated
  # prefix in the shared computeflux-db-backups bucket.
  backup:
    barmanObjectStore:
      destinationPath: s3://computeflux-db-backups/umami/
      endpointURL: https://fsn1.your-objectstorage.com
      s3Credentials:
        accessKeyId:
          name: zot-s3-credentials
          key: access-key
        secretAccessKey:
          name: zot-s3-credentials
          key: secret-key
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "30d"

  monitoring:
    enablePodMonitor: false
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: umami-pg-backup
  namespace: platform
  labels:
    app.kubernetes.io/instance: umami
    app.kubernetes.io/component: backup
spec:
  # Daily at 03:00 UTC (offset from other cluster backups). Takes a base backup;
  # WAL archiving above gives point-in-time recovery between base backups.
  schedule: "0 0 3 * * *"
  backupOwnerReference: self
  cluster:
    name: umami-pg-cluster
  immediate: true
